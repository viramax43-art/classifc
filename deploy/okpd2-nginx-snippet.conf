# ОКПД 2 classificator — вставить ПЕРЕД location /api/ (оба server-блока)
# __PHP_FPM_SOCK__ → /run/php/php8.4-fpm.sock

location = /okpd2 {
    return 301 /okpd2/;
}

location ^~ /api/okpd2/ {
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME /var/www/okpd2/public/index.php;
    fastcgi_param REQUEST_URI $request_uri;
    fastcgi_pass unix:__PHP_FPM_SOCK__;
}

location ^~ /api/tnved/ {
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME /var/www/okpd2/public/index.php;
    fastcgi_param REQUEST_URI $request_uri;
    fastcgi_pass unix:__PHP_FPM_SOCK__;
}

location = /tnved {
    return 301 /okpd2/tnved;
}

location ^~ /okpd2/ {
    alias /var/www/okpd2/public/;
    try_files $uri @okpd2;
}

location @okpd2 {
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME /var/www/okpd2/public/index.php;
    fastcgi_param REQUEST_URI $request_uri;
    fastcgi_pass unix:__PHP_FPM_SOCK__;
}
